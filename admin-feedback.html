<!DOCTYPE html>
<html lang="ko">
<head>
<script src="assets/app.js"></script>
<script src="assets/admin-guard.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STTY · Admin · 요청 게시판</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
:root{--bg:#fefefc;--paper:#fff;--ink:#202020;--sub:#878680;--faint:#d4d2cd;
  --line:#ededeb;--accent:#a06440;--hover:#f5f4f0;
  --ok:#3a8a6a;--warn:#b07a2a;--bad:#b03a3a;--info:#3a82d6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--paper);
  color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55;font-size:13.5px}
a{color:inherit;text-decoration:none}
.en{font-size:.7em;opacity:.42;margin-left:5px;font-weight:500;letter-spacing:.02em;font-style:normal}
.mono{font-family:'SF Mono',Menlo,monospace;font-variant-numeric:tabular-nums}

.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sb{background:#f9f8f4;border-right:1px solid var(--line);font-size:13px;display:flex;flex-direction:column}

/* 사이드바 네비 항목 (admin-nav.js 가 .item 클래스로 생성) */
.item{display:flex;align-items:center;gap:8px;padding:5px 8px 5px 22px;cursor:pointer;
  border-radius:4px;color:var(--sub);font-weight:600;margin:1px 0;font-size:13px}
.item:hover{background:var(--hover);color:var(--ink)}
.item.on{background:var(--ink);color:#fff}
.item .ico{width:14px;text-align:center;font-size:13px;flex:none}
.item .badge{margin-left:auto;font-size:10.5px;color:var(--faint);font-weight:700}
.item.on .badge{color:rgba(255,255,255,.6)}
.item.alert .badge{color:var(--bad);font-weight:800}
.item.on.alert .badge{color:#ffb3a8}

.main{display:flex;flex-direction:column;min-width:0}
.top{padding:14px 28px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line)}
.crumb{font-size:13px;color:var(--sub)}.crumb b{color:var(--ink);font-weight:700}
.crumb .sep{color:var(--faint);margin:0 6px}
.top .r{margin-left:auto;display:flex;gap:6px;font-size:12.5px}
.top .r a{padding:6px 10px;border-radius:5px;cursor:pointer;color:var(--sub)}
.top .r a:hover{background:var(--hover);color:var(--ink)}

.content{padding:30px 36px 60px;flex:1;overflow-y:auto;max-width:1100px;width:100%}

.ph{margin-bottom:24px}
.ph .ico{font-size:32px;display:block;margin-bottom:8px;color:var(--accent)}
.ph h1{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.15;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.ph h1 small{font-size:12.5px;color:var(--sub);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.ph .desc{font-size:13.5px;color:var(--sub);margin-top:8px;max-width:680px;line-height:1.7}

/* 새 요청 토글 버튼 + 입력 카드 */
.compose-toggle{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;
  padding:11px 22px;font-size:13px;font-weight:800;letter-spacing:.04em;cursor:pointer;border-radius:99px;
  font-family:inherit;margin-bottom:18px;transition:.15s}
.compose-toggle:hover{background:var(--accent);transform:translateY(-1px)}
.compose-toggle .ic{font-size:16px}
.compose{display:none;background:linear-gradient(180deg,#fff,#fafaf7);border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-bottom:24px}
.compose.open{display:block}
.compose h3{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.compose .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.compose label{display:block;font-size:11.5px;color:var(--sub);font-weight:700;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.compose select,.compose input,.compose textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:5px;font-size:13px;font-family:inherit;background:#fff;outline:none;color:var(--ink)}
.compose select:focus,.compose input:focus,.compose textarea:focus{border-color:var(--accent)}
.compose textarea{min-height:80px;resize:vertical;line-height:1.55}
.compose .btn{margin-top:10px;background:var(--ink);color:#fff;border:none;padding:11px 22px;font-weight:800;letter-spacing:.06em;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;text-transform:uppercase}
.compose .btn:hover{background:var(--accent)}
.compose .btn:disabled{opacity:.5;cursor:not-allowed}
.compose .hint{font-size:11.5px;color:var(--sub);margin-top:6px}

/* 첨부파일 */
.fattach{margin-top:10px;border:2px dashed var(--line);border-radius:6px;padding:14px;text-align:center;
  font-size:12.5px;color:var(--sub);cursor:pointer;transition:.15s}
.fattach:hover,.fattach.drag{border-color:var(--accent);color:var(--ink);background:#fef9f4}
.fattach .ic{font-size:20px;display:block;margin-bottom:4px}
.fattach input{display:none}
.fattach-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.fattach-list .ti{position:relative;width:80px;height:80px;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--hover)}
.fattach-list .ti img{width:100%;height:100%;object-fit:cover}
.fattach-list .ti .fn{position:absolute;inset:auto 0 0 0;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:2px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fattach-list .ti .x{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:grid;place-items:center}
.fattach-list .ti.uploading::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.6) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23a06440' stroke-width='2'><circle cx='12' cy='12' r='10' stroke-dasharray='40' stroke-dashoffset='10'><animateTransform attributeName='transform' type='rotate' from='0 12 12' to='360 12 12' dur='1s' repeatCount='indefinite'/></circle></svg>") no-repeat center}

/* 리스트 아이템 첨부 표시 */
.list .item .at{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0 24px}
.list .item .at img{width:90px;height:90px;object-fit:cover;border-radius:5px;cursor:pointer;border:1px solid var(--line)}
.list .item .at .file{display:inline-flex;align-items:center;gap:6px;background:var(--hover);padding:6px 10px;border-radius:5px;font-size:11.5px;color:var(--ink);text-decoration:none}
.list .item .at .file:hover{background:var(--accent);color:#fff}

/* 라이트박스 */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out}
.lb.on{display:flex}
.lb img{max-width:92%;max-height:92%;object-fit:contain}
.lb .x{position:absolute;top:18px;right:24px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none}

/* 카피 버튼 — Claude에게 복사 */
.list .item .meta .copyc{font-size:11px;color:var(--info);cursor:pointer;font-weight:700;padding:2px 6px;border-radius:3px}
.list .item .meta .copyc:hover{background:#e6eff9}

/* 필터 바 */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filters button{background:#fff;border:1px solid var(--line);color:var(--sub);padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.filters button:hover{border-color:var(--ink);color:var(--ink)}
.filters button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.filters .count{margin-left:5px;opacity:.6;font-size:11px}

/* 카드 리스트 — .list 안의 .item 만 (사이드바의 .item 과 충돌 방지) */
.list{display:flex;flex-direction:column;gap:8px}
.list .item{background:#fff;border:1px solid var(--line);border-radius:7px;padding:14px 16px;transition:.12s}
.list .item:hover{border-color:var(--ink);box-shadow:0 4px 14px -8px rgba(0,0,0,.1)}
.list .item.done{opacity:.55;background:#f9f9f6}
.list .item .h{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.list .item .h .tag{font-size:10px;font-weight:800;letter-spacing:.08em;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.tag.bug{background:#fdebeb;color:var(--bad)}
.tag.feature{background:#e6eff9;color:var(--info)}
.tag.design{background:#f4ecfa;color:#7a4ab0}
.tag.content{background:#fdf0eb;color:var(--warn)}
.tag.idea{background:var(--hover);color:var(--sub)}
.item .h .pri{font-size:10px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.pri.high{background:var(--bad);color:#fff}
.pri.med{background:var(--warn);color:#fff}
.pri.low{background:var(--faint);color:#fff}
.item .h .by{font-size:11.5px;color:var(--sub);font-weight:600;margin-left:auto}
.item .h .by b{color:var(--ink);font-weight:700}
.item .ti{font-size:14.5px;font-weight:700;line-height:1.4;margin:3px 0 4px;display:flex;align-items:flex-start;gap:6px}
.item .ti .check{width:18px;height:18px;border:1.5px solid var(--faint);border-radius:4px;flex:none;margin-top:2px;cursor:pointer;display:grid;place-items:center;background:#fff;transition:.12s}
.item.done .ti .check{background:var(--ok);border-color:var(--ok);color:#fff}
.item .ti .check::after{content:"✓";color:#fff;font-size:13px;font-weight:800;opacity:0}
.item.done .ti .check::after{opacity:1}
.item.done .ti b{text-decoration:line-through;color:var(--sub)}
.item .body{font-size:12.5px;color:var(--sub);line-height:1.65;margin-left:24px;white-space:pre-wrap}
.item .meta{display:flex;gap:14px;margin:8px 0 0 24px;font-size:11.5px;color:var(--faint);align-items:center;flex-wrap:wrap}
.item .meta a{color:var(--info);font-weight:600}
.item .meta .del{margin-left:auto;color:var(--bad);cursor:pointer;opacity:.5;font-weight:700}
.item .meta .del:hover{opacity:1}
.item .meta select{font-size:11px;font-family:inherit;padding:2px 6px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--sub);font-weight:700}

.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .ic{font-size:42px;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px}
.empty b{display:block;font-size:15px;color:var(--ink);font-weight:700;margin-bottom:6px}

.banner{background:#fffbf0;border:1px solid #f0e0b0;border-radius:7px;padding:12px 16px;font-size:12.5px;color:var(--warn);margin-bottom:14px;display:flex;gap:8px;align-items:flex-start}
.banner.ok{background:#f0faf4;border-color:#cfe7d8;color:var(--ok)}
.banner.bad{background:#fdf0f0;border-color:#f0c8c8;color:var(--bad)}
.banner b{font-weight:800}

@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .compose .row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sb"></aside>
  <main class="main">
    <div class="top">
      <div class="crumb"><b>요청 게시판</b><span class="sep">·</span>Feedback Board</div>
      <div class="r">
        <a href="admin-c.html">← 대시보드</a>
        <a href="index.html">손님 사이트</a>
      </div>
    </div>

    <div class="content">
      <div class="ph">
        <span class="ico">📮</span>
        <h1>요청 게시판 <small>FEEDBACK · BUG · IDEA</small></h1>
        <p class="desc">작업하다 발견한 버그·고치고 싶은 부분·아이디어를 남겨두세요.<br>집에서·외부에서도 로그인만 하면 같은 목록을 볼 수 있어요. (Supabase 저장)</p>
      </div>

      <div id="banner"></div>

      <button class="compose-toggle" id="composeToggle"><span class="ic">＋</span><span id="composeLabel">새 요청 작성</span></button>

      <!-- 새 요청 입력 -->
      <div class="compose" id="compose">
        <h3>✏️ 새 요청 남기기</h3>
        <div class="row">
          <div>
            <label>유형</label>
            <select id="fType">
              <option value="bug">🐞 버그</option>
              <option value="feature">✨ 기능 추가</option>
              <option value="design">🎨 디자인</option>
              <option value="content">📝 콘텐츠</option>
              <option value="idea">💡 아이디어</option>
            </select>
          </div>
          <div>
            <label>중요도</label>
            <select id="fPri">
              <option value="high">🔴 높음</option>
              <option value="med" selected>🟡 보통</option>
              <option value="low">🟢 낮음</option>
            </select>
          </div>
          <div>
            <label>관련 페이지 (선택)</label>
            <input id="fPage" placeholder="예: product-detail-a.html" />
          </div>
        </div>
        <div style="margin-bottom:10px">
          <label>제목 *</label>
          <input id="fTitle" placeholder="예: 모바일에서 장바구니 버튼이 안 보여요" />
        </div>
        <div>
          <label>설명 (선택)</label>
          <textarea id="fBody" placeholder="자세한 상황·재현 순서·원하는 모습 등 자유롭게"></textarea>
        </div>
        <label for="fAttach" class="fattach" id="fAttachZone">
          <span class="ic">📎</span>
          <b>이미지·파일 끌어다 놓기 또는 클릭해서 선택</b>
          <div style="font-size:11px;color:var(--faint);margin-top:3px">JPG·PNG·GIF·WEBP·PDF — 한 파일당 최대 10 MB</div>
          <input id="fAttach" type="file" accept="image/*,.pdf,.gif,.webp" multiple>
        </label>
        <div class="fattach-list" id="fAttachList"></div>

        <button class="btn" id="fSubmit">요청 등록</button>
        <div class="hint">💡 작성자는 로그인된 닉네임으로 자동 기록돼요.</div>
      </div>

      <!-- 필터 -->
      <div class="filters">
        <button data-f="all" class="on">전체 <span class="count" id="cAll">0</span></button>
        <button data-f="open">진행 전 <span class="count" id="cOpen">0</span></button>
        <button data-f="progress">진행 중 <span class="count" id="cProg">0</span></button>
        <button data-f="done">완료 <span class="count" id="cDone">0</span></button>
        <button data-f="bug">🐞 버그만</button>
        <button data-f="feature">✨ 기능만</button>
      </div>

      <div class="list" id="list">
        <div class="empty"><div class="ic">📮</div><b>아직 등록된 요청이 없어요</b><p>위 "새 요청 작성" 버튼을 눌러 첫 번째 요청을 남겨보세요.</p></div>
      </div>
    </div>
  </main>
</div>

<!-- 이미지 라이트박스 -->
<div class="lb" id="lb"><button class="x" id="lbX">✕</button><img id="lbImg" alt=""></div>

<script src="assets/admin-nav.js?v=4"></script>
<script>
(async function(){
  'use strict';
  const $=(s,r=document)=>r.querySelector(s);
  const banner=$('#banner');
  function bn(text,kind){
    banner.innerHTML = `<div class="banner ${kind||''}"><b>${kind==='bad'?'⚠':kind==='ok'?'✓':'ℹ'}</b> <span>${text}</span></div>`;
  }

  // Supabase client 준비 — lib 직접 로드 (로그아웃 상태에서도 동작)
  function loadLib(){
    if(window.supabase) return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      s.async=true;s.onload=resolve;s.onerror=()=>reject(new Error('Supabase lib 로드 실패'));
      document.head.appendChild(s);
    });
  }
  let client=null;
  try{
    await loadLib();
    const URL='https://wzmtcomawebufylojffx.supabase.co';
    const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6bXRjb21hd2VidWZ5bG9qZmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTg5MjcsImV4cCI6MjA5NTQzNDkyN30.6P0ZSLTU7XPudr9Ove2S0Nc5XO7pdb87LUVDdVJKmEM';
    client = window.supabase.createClient(URL,KEY,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'sb-wzmtcomawebufylojffx-auth-token'}});
  }catch(e){
    bn('Supabase 연결 실패 — 인터넷·키 확인 필요','bad');
    return;
  }

  // 로컬 캐시 (오프라인·로그인 전 임시 보관)
  const LOCAL_KEY='seoti_feedback_local_v1';
  function loadLocal(){try{return JSON.parse(localStorage.getItem(LOCAL_KEY))||[];}catch(e){return[];}}
  function saveLocal(arr){localStorage.setItem(LOCAL_KEY,JSON.stringify(arr));}

  let items=[];
  let filter='all';
  let usingLocal=false;

  async function fetchAll(){
    const u=SEOTI.api.getUser();
    if(!u){
      usingLocal=true;
      items=loadLocal();
      bn('로그인 안 됨 — 임시로 이 브라우저에만 저장됩니다. <a href="auth-b.html" style="color:inherit;font-weight:800;text-decoration:underline">로그인하기</a>','bad');
      render();return;
    }
    const isAdmin=await SEOTI.api.isAdmin();
    if(!isAdmin){
      usingLocal=true;
      items=loadLocal();
      bn('관리자 권한이 없어 Supabase에 저장되지 않습니다 (이 브라우저에만 보관). 관리자 권한은 SQL에서 <span class="mono">UPDATE profiles SET is_admin=true WHERE id=auth.uid()</span> 로 부여','bad');
      render();return;
    }
    const {data,error}=await client.from('feedback').select('*').order('created_at',{ascending:false});
    if(error){
      bn('불러오기 실패 — '+error.message+' · 로컬 캐시로 표시','bad');
      usingLocal=true;items=loadLocal();render();return;
    }
    items=data||[];
    // 로컬에 남아있던 거 동기화 (한 번만)
    const local=loadLocal();
    if(local.length){
      for(const it of local){
        await client.from('feedback').insert({
          user_id:u.id,author:it.author||u.nickname||'서티',
          type:it.type,priority:it.priority,status:it.status||'open',
          title:it.title,body:it.body,page_url:it.page_url
        });
      }
      saveLocal([]);
      const r=await client.from('feedback').select('*').order('created_at',{ascending:false});
      items=r.data||[];
      bn(`로컬 임시 데이터 ${local.length}건을 Supabase로 옮겼어요`,'ok');
    }
    render();
  }

  function render(){
    const root=$('#list');
    const c={all:items.length,open:0,progress:0,done:0};
    items.forEach(i=>{c[i.status]=(c[i.status]||0)+1;});
    $('#cAll').textContent=c.all;$('#cOpen').textContent=c.open;
    $('#cProg').textContent=c.progress;$('#cDone').textContent=c.done;

    let list=items;
    if(filter==='open'||filter==='progress'||filter==='done') list=items.filter(i=>i.status===filter);
    else if(filter!=='all') list=items.filter(i=>i.type===filter);

    if(!list.length){
      root.innerHTML=`<div class="empty"><div class="ic">📮</div><b>해당 항목이 없어요</b><p>다른 필터를 눌러보세요.</p></div>`;
      return;
    }
    root.innerHTML=list.map(it=>{
      const isDone=it.status==='done'||it.status==='wontfix';
      const dt=new Date(it.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const atts=Array.isArray(it.attachments)?it.attachments:[];
      const attHtml=atts.length?`<div class="at">${atts.map(a=>{
        if((a.type||'').startsWith('image/')) return `<img src="${escapeAttr(a.url)}" alt="${escapeAttr(a.name||'')}" data-zoom="${escapeAttr(a.url)}">`;
        return `<a class="file" href="${escapeAttr(a.url)}" target="_blank">📎 ${escapeHtml(a.name||'file')}</a>`;
      }).join('')}</div>`:'';
      return `<div class="item ${isDone?'done':''}" data-id="${it.id}">
        <div class="h">
          <span class="tag ${it.type}">${({bug:'🐞 BUG',feature:'✨ FEATURE',design:'🎨 DESIGN',content:'📝 CONTENT',idea:'💡 IDEA'})[it.type]||it.type}</span>
          <span class="pri ${it.priority}">${({high:'HIGH',med:'MED',low:'LOW'})[it.priority]||it.priority}</span>
          <span class="by"><b>${it.author||'익명'}</b> · ${dt}</span>
        </div>
        <div class="ti">
          <span class="check" data-act="toggle"></span>
          <b>${escapeHtml(it.title)}</b>
        </div>
        ${it.body?`<div class="body">${escapeHtml(it.body)}</div>`:''}
        ${attHtml}
        <div class="meta">
          ${it.page_url?`<a href="${escapeAttr(it.page_url)}" target="_blank">📄 ${escapeHtml(it.page_url)}</a>`:''}
          <select data-act="status">
            <option value="open"${it.status==='open'?' selected':''}>진행 전</option>
            <option value="progress"${it.status==='progress'?' selected':''}>진행 중</option>
            <option value="done"${it.status==='done'?' selected':''}>완료</option>
            <option value="wontfix"${it.status==='wontfix'?' selected':''}>보류</option>
          </select>
          <span class="copyc" data-act="copy" title="Claude에게 보낼 형식으로 복사">📋 Claude에 복사</span>
          <span class="del" data-act="del">삭제</span>
        </div>
      </div>`;
    }).join('');
  }

  function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function escapeAttr(s){return escapeHtml(s);}

  // 필터 클릭
  document.querySelectorAll('.filters button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');filter=b.dataset.f;render();
    });
  });

  // 리스트 액션
  $('#list').addEventListener('click',async e=>{
    // 이미지 클릭 → 라이트박스
    if(e.target.tagName==='IMG' && e.target.dataset.zoom){
      $('#lbImg').src=e.target.dataset.zoom;
      $('#lb').classList.add('on');
      return;
    }
    const item=e.target.closest('.item');if(!item)return;
    const id=item.dataset.id;
    const act=e.target.dataset.act;
    if(act==='toggle'){
      const cur=items.find(i=>String(i.id)===String(id));
      const next=(cur.status==='done')?'open':'done';
      await updateStatus(id,next);
    }else if(act==='del'){
      if(!confirm('이 요청을 삭제할까요?'))return;
      await del(id);
    }else if(act==='copy'){
      const it=items.find(i=>String(i.id)===String(id));
      if(!it)return;
      const atts=Array.isArray(it.attachments)?it.attachments:[];
      const txt=`[${(it.type||'').toUpperCase()} · ${(it.priority||'').toUpperCase()}] ${it.title}\n`+
        (it.body?`${it.body}\n`:'')+
        (it.page_url?`📄 페이지: ${it.page_url}\n`:'')+
        (atts.length?`📎 첨부: ${atts.map(a=>a.url).join(' , ')}\n`:'')+
        `\n(요청 게시판 #${it.id} · 상태: ${it.status})`;
      try{await navigator.clipboard.writeText(txt);SEOTI.toast('Claude에게 보낼 텍스트가 복사됐어요 — 채팅에 붙여넣으세요','success');}
      catch(err){SEOTI.toast('복사 실패 — 수동 선택','error');console.log(txt);}
    }
  });

  // 라이트박스 닫기
  $('#lbX').addEventListener('click',()=>$('#lb').classList.remove('on'));
  $('#lb').addEventListener('click',e=>{if(e.target.id==='lb')$('#lb').classList.remove('on');});

  // 컴포즈 토글
  const composeEl=$('#compose');
  $('#composeToggle').addEventListener('click',()=>{
    composeEl.classList.toggle('open');
    $('#composeLabel').textContent=composeEl.classList.contains('open')?'접기':'새 요청 작성';
  });

  // 첨부파일 — 펜딩 리스트 (등록 전엔 메모리에만)
  let pendingFiles=[]; // {file, previewUrl, name, type, size}
  const attachList=$('#fAttachList');
  function renderPending(){
    attachList.innerHTML=pendingFiles.map((p,i)=>{
      const isImg=(p.type||'').startsWith('image/');
      const thumb=isImg?`<img src="${p.previewUrl}" alt="">`:`<div style="display:grid;place-items:center;height:100%;font-size:24px">📄</div>`;
      return `<div class="ti" data-idx="${i}">${thumb}<span class="fn">${escapeHtml(p.name)}</span><button class="x" data-act="rm" data-idx="${i}" type="button">✕</button></div>`;
    }).join('');
  }
  function addFiles(files){
    for(const f of files){
      if(f.size>10*1024*1024){SEOTI.toast(`${f.name} — 10MB 초과 (스킵)`,'warn');continue;}
      const previewUrl=f.type.startsWith('image/')?URL.createObjectURL(f):'';
      pendingFiles.push({file:f,previewUrl,name:f.name,type:f.type,size:f.size});
    }
    renderPending();
  }
  $('#fAttach').addEventListener('change',e=>{addFiles(e.target.files);e.target.value='';});
  const zone=$('#fAttachZone');
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');addFiles(e.dataTransfer.files);});
  attachList.addEventListener('click',e=>{
    if(e.target.dataset.act!=='rm')return;
    const idx=+e.target.dataset.idx;
    const p=pendingFiles[idx];
    if(p?.previewUrl)URL.revokeObjectURL(p.previewUrl);
    pendingFiles.splice(idx,1);
    renderPending();
  });

  // Storage 업로드 — pendingFiles 를 feedback-attachments 버킷에 PUT
  async function uploadAttachments(){
    if(!pendingFiles.length||usingLocal)return [];
    const u=SEOTI.api.getUser();
    if(!u)return [];
    const uploaded=[];
    for(const p of pendingFiles){
      const ext=(p.name.split('.').pop()||'bin').toLowerCase();
      const path=`${u.id}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const {error}=await client.storage.from('feedback-attachments').upload(path,p.file,{contentType:p.type,upsert:false});
      if(error){SEOTI.toast(`${p.name} 업로드 실패: ${error.message}`,'error');continue;}
      const {data:pub}=client.storage.from('feedback-attachments').getPublicUrl(path);
      uploaded.push({url:pub.publicUrl,name:p.name,type:p.type,size:p.size,path});
    }
    return uploaded;
  }
  $('#list').addEventListener('change',async e=>{
    if(e.target.dataset.act!=='status')return;
    const item=e.target.closest('.item');
    await updateStatus(item.dataset.id,e.target.value);
  });

  async function updateStatus(id,status){
    if(usingLocal){
      const it=items.find(i=>String(i.id)===String(id));
      if(it){it.status=status;saveLocal(items);}
      render();return;
    }
    const {error}=await client.from('feedback').update({status,updated_at:new Date().toISOString()}).eq('id',id);
    if(error){alert('업데이트 실패: '+error.message);return;}
    const it=items.find(i=>String(i.id)===String(id));if(it)it.status=status;
    render();
  }
  async function del(id){
    if(usingLocal){items=items.filter(i=>String(i.id)!==String(id));saveLocal(items);render();return;}
    const {error}=await client.from('feedback').delete().eq('id',id);
    if(error){alert('삭제 실패: '+error.message);return;}
    items=items.filter(i=>String(i.id)!==String(id));render();
  }

  // 새 요청 등록
  $('#fSubmit').addEventListener('click',async()=>{
    const title=$('#fTitle').value.trim();
    if(!title){alert('제목은 필수예요');return;}
    const payload={
      type:$('#fType').value,
      priority:$('#fPri').value,
      title,
      body:$('#fBody').value.trim()||null,
      page_url:$('#fPage').value.trim()||null,
      status:'open',
      attachments:[]
    };
    const u=SEOTI.api.getUser();
    payload.author=u?.nickname||'관리자';

    if(usingLocal){
      // 로컬은 첨부 미지원 (Supabase 로그인 후 등록)
      payload.id='local-'+Date.now();payload.created_at=new Date().toISOString();
      items.unshift(payload);saveLocal(items);
      $('#fSubmit').disabled=true;setTimeout(()=>$('#fSubmit').disabled=false,400);
      resetForm();
      SEOTI.toast('임시 저장됨 (로컬 · 첨부 제외)','warn');render();return;
    }
    $('#fSubmit').disabled=true;
    $('#fSubmit').textContent=pendingFiles.length?'업로드 중…':'등록 중…';
    // 1) 첨부 업로드
    payload.attachments=await uploadAttachments();
    // 2) 행 등록
    const {data,error}=await client.from('feedback').insert({...payload,user_id:u.id}).select().single();
    $('#fSubmit').disabled=false;
    $('#fSubmit').textContent='요청 등록';
    if(error){SEOTI.toast('등록 실패: '+error.message,'error');return;}
    items.unshift(data);
    resetForm();
    SEOTI.toast(`요청 등록됨 🎀 ${data.attachments?.length?`(첨부 ${data.attachments.length}장 포함)`:''}`,'success');
    render();
  });
  function resetForm(){
    $('#fTitle').value='';$('#fBody').value='';$('#fPage').value='';
    pendingFiles.forEach(p=>{if(p.previewUrl)URL.revokeObjectURL(p.previewUrl);});
    pendingFiles=[];renderPending();
    composeEl.classList.remove('open');
    $('#composeLabel').textContent='새 요청 작성';
  }

  // 자동 페이지 추천
  $('#fPage').setAttribute('list','pages-dl');
  const dl=document.createElement('datalist');dl.id='pages-dl';
  ['index.html','notice-b.html','mockup-b-minimal.html','archive.html','customer-bulk-order-c.html','customer-qna-b.html','contact.html','product-detail-a.html','cart-checkout-a.html','mypage-b.html','auth-b.html','admin-c.html','admin-content.html'].forEach(p=>{
    const o=document.createElement('option');o.value=p;dl.appendChild(o);
  });
  document.body.appendChild(dl);

  await fetchAll();
})();
</script>
</body>
</html>
