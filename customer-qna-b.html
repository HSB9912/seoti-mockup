<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서티 SEOTI · Q&A 변형 B — 게시판형</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root{
    --bg:#fafaf8; --paper:#fff; --ink:#1a1816; --sub:#857f78; --faint:#c4beb5;
    --line:#ebe6dd; --line2:#dcd5c9; --accent:#3a82d6; --ok:#3aa872; --warn:#d68a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--bg);
    color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
  .wrap{max-width:1280px;margin:0 auto;padding:0 28px}
  .en{font-size:.7em;opacity:.45;margin-left:6px;font-weight:500;letter-spacing:.02em;text-transform:none;font-style:normal}

  nav{background:var(--paper);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;height:62px;gap:30px}
  .logo{font-size:20px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
  .nav-r{margin-left:auto;font-size:13px;color:var(--sub)}
  .nav-r a{margin-left:20px;font-weight:600}.nav-r a.on{color:var(--ink)}

  .ph{padding:36px 0 28px;border-bottom:1px solid var(--line);background:var(--paper)}
  .ph-in{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
  .ph h1{font-size:30px;font-weight:800;letter-spacing:-.015em}
  .ph small{color:var(--sub);font-weight:600;margin-left:10px;font-size:14px}
  .ph .stats{display:flex;gap:30px;font-size:13px;color:var(--sub)}
  .ph .stats b{display:block;color:var(--ink);font-size:20px;font-weight:800;margin-top:3px}

  /* main grid */
  main{padding:30px 0 80px}
  .grid{display:grid;grid-template-columns:240px 1fr;gap:32px;align-items:flex-start}

  /* sidebar */
  .sb{background:var(--paper);border:1px solid var(--line);position:sticky;top:20px}
  .sb-blk{padding:18px 20px;border-bottom:1px solid var(--line)}
  .sb-blk:last-child{border-bottom:none}
  .sb-blk h4{font-size:10.5px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
    color:var(--sub);margin-bottom:12px}
  .sb a{display:flex;justify-content:space-between;align-items:center;padding:7px 0;
    font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;border-radius:3px;
    padding-left:8px;padding-right:8px;margin:0 -8px}
  .sb a:hover{background:var(--bg)}
  .sb a.on{background:var(--ink);color:#fff}
  .sb a.on .cnt{color:rgba(255,255,255,.55)}
  .sb a .cnt{font-size:12px;color:var(--faint);font-weight:700}
  .sb .ask-mini{margin:12px 20px 20px;display:block;background:var(--accent);color:#fff;
    text-align:center;padding:12px;font-size:13.5px;font-weight:800;letter-spacing:.02em}
  .sb .ask-mini:hover{background:var(--ink)}
  .top-ans{font-size:12.5px;color:var(--ink);padding:8px 0;border-bottom:1px dashed var(--line);line-height:1.5}
  .top-ans:last-child{border-bottom:none}
  .top-ans b{color:var(--sub);font-size:11px;display:block;margin-bottom:3px}

  /* board */
  .board{background:var(--paper);border:1px solid var(--line)}
  .b-top{padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    border-bottom:1px solid var(--line)}
  .b-top .sort{font-size:13px;font-weight:700;color:var(--sub)}
  .b-top .sort b{color:var(--ink)}
  .b-top .pipe{color:var(--line2)}
  .b-top .search{background:var(--bg);border:1px solid var(--line);padding:8px 14px;
    font-family:inherit;font-size:13px;outline:none;width:240px;margin-left:auto}
  .b-top .ask{background:var(--ink);color:#fff;border:none;font-family:inherit;font-size:13px;
    font-weight:800;padding:9px 16px;letter-spacing:.04em;cursor:pointer}
  .b-top .ask:hover{background:var(--accent)}

  /* table-ish list */
  .row-head,.row{display:grid;grid-template-columns:50px 90px 1fr 110px 100px 90px;gap:14px;
    align-items:center;padding:13px 20px;font-size:13px}
  .row-head{background:var(--bg);border-bottom:1px solid var(--line2);color:var(--sub);
    font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  .row{border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .row:hover{background:var(--bg)}
  .row.open{background:var(--bg)}
  .row .no{color:var(--faint);font-weight:700;font-variant-numeric:tabular-nums}
  .row .cat{font-size:11.5px;font-weight:800;letter-spacing:.05em;color:var(--sub);
    background:#fff;border:1px solid var(--line);padding:3px 9px;text-align:center;width:fit-content}
  .row .tt{font-weight:700;font-size:14px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;min-width:0}
  .row .tt span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .row .tt .lock{font-size:11px;color:var(--sub)}
  .row .by{color:var(--sub);font-size:13px}
  .row .dt{color:var(--sub);font-size:12.5px;font-variant-numeric:tabular-nums}
  .row .st{font-size:10.5px;font-weight:800;letter-spacing:.06em;padding:4px 9px;text-align:center;
    text-transform:uppercase;background:var(--ok);color:#fff;width:fit-content}
  .row .st.wait{background:#fff;color:var(--warn);border:1px solid var(--warn)}

  /* expanded inline detail */
  .detail{display:none;grid-column:1 / -1;padding:24px 30px;background:var(--bg);
    border-top:1px solid var(--line2);border-bottom:2px solid var(--ink)}
  .row.open + .detail{display:block}
  .det-q,.det-a{display:flex;gap:18px;padding:14px 0}
  .det-q + .det-a{border-top:1px dashed var(--line2);margin-top:6px}
  .det-q .lbl,.det-a .lbl{width:32px;height:32px;background:var(--ink);color:#fff;
    font-weight:800;font-size:13px;display:grid;place-items:center;flex:none}
  .det-a .lbl{background:var(--accent)}
  .det-q .body,.det-a .body{flex:1}
  .det-q h4{font-size:16px;font-weight:800;margin-bottom:5px;letter-spacing:-.01em}
  .det-q .meta{font-size:12px;color:var(--sub);margin-bottom:6px}
  .det-q p,.det-a p{font-size:13.5px;line-height:1.8;color:var(--ink)}
  .det-a .meta{font-size:12px;color:var(--sub);margin-bottom:6px}
  .det-a .meta b{color:var(--ink)}
  .det-actions{margin-top:12px;display:flex;gap:8px}
  .det-actions a{font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;padding:5px 10px;
    background:#fff;border:1px solid var(--line)}
  .det-actions a:hover{color:var(--ink);border-color:var(--ink)}

  /* page */
  .page{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;font-size:13px}
  .page-info{color:var(--sub);font-weight:600}
  .page-nums{display:flex;gap:2px}
  .page-nums a{padding:7px 12px;color:var(--sub);font-weight:700;cursor:pointer}
  .page-nums a.on{background:var(--ink);color:#fff}

  footer{padding:30px 0;font-size:12px;color:var(--sub);text-align:center;border-top:1px solid var(--line)}

  @media(max-width:880px){
    .grid{grid-template-columns:1fr}
    .sb{position:static}
    .row-head,.row{grid-template-columns:60px 1fr 90px;font-size:12px}
    .row-head .by,.row-head .dt,.row .by,.row .dt{display:none}
    .row-head .cat,.row .cat{display:none}
  }
</style>
</head>
<body data-page="qna">

<div id="seoti-nav"></div>

<header class="ph">
  <div class="wrap ph-in">
    <div>
      <h1>고객 문의 <small>Customer Q&A</small></h1>
    </div>
    <div class="stats">
      <div>전체 문의<b>—</b></div>
      <div>답변 완료<b>—</b></div>
      <div>답변 대기<b>—</b></div>
      <div>평균 답변<b>—</b></div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <!-- SIDEBAR -->
    <aside class="sb">
      <a class="ask-mini">+ 새 문의 작성<i class="en">Ask</i></a>
      <div class="sb-blk">
        <h4>카테고리<i class="en">Category</i></h4>
        <a class="on">전체</a>
        <a>배송</a>
        <a>제품</a>
        <a>결제 · 환불</a>
        <a>교환 · A/S</a>
        <a>기타</a>
      </div>
      <div class="sb-blk">
        <h4>상태<i class="en">Status</i></h4>
        <a>전체 보기</a>
        <a>답변 완료</a>
        <a>답변 대기</a>
        <a>내 문의</a>
      </div>
    </aside>

    <!-- BOARD -->
    <section>
      <div class="board">
        <div class="b-top">
          <span class="sort">정렬 · <b>최신순</b></span>
          <span class="pipe">|</span>
          <span class="sort">답변 대기만 보기</span>
          <input class="search" placeholder="🔍 제목·내용 검색">
          <button class="ask">+ 문의 작성</button>
        </div>
        <div class="row-head">
          <span>No.</span><span>분류</span><span>제목</span><span>작성자</span><span>작성일</span><span>상태</span>
        </div>
        <div id="rows"></div>
      </div>

    </section>
  </div>
</main>

<footer>© 2026 SEOTI — 디자인 시안용 목업 · Q&A 게시판형</footer>

<script>
// 문의 데이터는 어드민에서 답변하면 Supabase qna 테이블에서 로드 예정
const qa = [];
const cls={answered:["","답변완료"],wait:["wait","답변대기"]};
if (!qa.length) {
  document.getElementById('rows').innerHTML =
    '<div style="padding:80px 30px;text-align:center"><div style="font-size:42px;margin-bottom:14px;opacity:.5">💬</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">아직 등록된 문의가 없어요</h2><p style="font-size:13.5px;color:#8c8781;line-height:1.7">위 <b>+ 문의 작성</b> 버튼으로 첫 문의를 남겨보세요.</p></div>';
}
document.getElementById('rows').innerHTML += qa.map((q,i)=>`
 <div class="row" data-i="${i}">
   <span class="no">${q.no}</span>
   <span class="cat">${q.c}</span>
   <span class="tt"><span>${q.t}</span> ${q.lock?'<span class="lock">🔒</span>':''}</span>
   <span class="by">${q.by}</span>
   <span class="dt">2026-${q.d}</span>
   <span class="st ${cls[q.s][0]}">${cls[q.s][1]}</span>
 </div>
 <div class="detail">
   <div class="det-q">
     <div class="lbl">Q</div>
     <div class="body">
       <h4>${q.t}</h4>
       <div class="meta">${q.by} · 2026-${q.d} · ${q.c} · 조회 ${Math.floor(Math.random()*200+40)}</div>
       <p>${q.q}</p>
       <div class="det-actions"><a>🔗 공유</a><a>📌 북마크</a><a>🚩 신고</a></div>
     </div>
   </div>
   ${q.ans?`<div class="det-a">
     <div class="lbl">A</div>
     <div class="body">
       <div class="meta"><b>${q.resp}</b> · 답변 2026-${q.d} · 도움됨 ${Math.floor(Math.random()*40+5)}</div>
       <p>${q.ans}</p>
     </div>
   </div>`:`<div class="det-a"><div class="lbl" style="background:var(--faint)">A</div><div class="body"><div class="meta">아직 답변이 등록되지 않았어요</div></div></div>`}
 </div>`).join('');
document.addEventListener('click',e=>{
  const r=e.target.closest('.row');if(!r)return;
  document.querySelectorAll('.row').forEach(x=>{if(x!==r)x.classList.remove('open')});
  r.classList.toggle('open');
});
</script>
<script src="assets/app.js"></script>
<script src="assets/nav.js"></script>
</body>
</html>
