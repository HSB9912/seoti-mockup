<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:#fafaf7;color:#161412;padding:24px;font-size:13.5px;line-height:1.5}
.mono{font-family:'SF Mono',Menlo,monospace;font-variant-numeric:tabular-nums}
h1{font-size:22px;font-weight:800;margin-bottom:6px}

.hint{color:#878680;font-size:12.5px;margin-bottom:18px}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
button{padding:9px 16px;border:1px solid #ededeb;background:#fff;border-radius:5px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}
button.p{background:#161412;color:#fff;border-color:#161412}
button:disabled{opacity:.4;cursor:not-allowed}
.box{background:#fff;border:1px solid #ededeb;border-radius:6px;padding:18px;margin-bottom:18px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:8px 10px;background:#fafaf7;border-bottom:1px solid #ededeb;font-size:10.5px;letter-spacing:.04em;color:#878680;font-weight:800;text-transform:uppercase}
td{padding:7px 10px;border-bottom:1px solid #f5f4f0}
td.r{text-align:right}
.tag{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10.5px;font-weight:700}
.tag.in{background:#eaf6ee;color:#3a8a6a}
.tag.out{background:#fef0e7;color:#b07a2a}
.tag.disc{background:#f5f4f0;color:#878680}
.tag.event{background:#fff5e7;color:#a06440}
.tag.dot{background:#eef4fb;color:#3a82d6}
.diff{color:#b03a3a;font-weight:700}
.same{color:#878680}
.new{background:#eaf6ee;color:#3a8a6a;padding:1px 7px;border-radius:99px;font-size:10.5px;font-weight:700}
#log{background:#161412;color:#7fd296;padding:14px;border-radius:6px;font-family:'SF Mono',Menlo,monospace;font-size:11.5px;max-height:220px;overflow-y:auto;white-space:pre-wrap;line-height:1.5}
.stat{display:inline-block;background:#fff;border:1px solid #ededeb;padding:8px 14px;border-radius:5px;margin-right:8px;font-size:12px}
.stat b{color:#161412;font-weight:800;font-size:14px;margin-right:4px}
.auth-warn{background:#fdebeb;border:1px solid #f0b3b3;color:#b03a3a;padding:14px;border-radius:6px;margin-bottom:14px}
</style>
</head>

<script>
const SB_URL = 'https://wzmtcomawebufylojffx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6bXRjb21hd2VidWZ5bG9qZmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTg5MjcsImV4cCI6MjA5NTQzNDkyN30.6P0ZSLTU7XPudr9Ove2S0Nc5XO7pdb87LUVDdVJKmEM';
const sb = window.supabase.createClient(SB_URL, SB_KEY, {
  auth:{persistSession:true,autoRefreshToken:true,storageKey:'sb-wzmtcomawebufylojffx-auth-token'}
});

const logEl = document.getElementById('log');
function log(msg, cls=''){
  const line = (cls==='err'?'⚠ ':cls==='ok'?'✓ ':cls==='info'?'• ':'  ') + msg;
  logEl.textContent += '\n' + line;
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== 분류 → state 매핑 =====
function mapState(분류, stock){
  if (분류 === '단종') return 'disc';
  if (분류 === '판매중지') return 'disc';
  if (분류 === '이벤트') return 'in';
  if (분류 === '닷닷닷') return 'in';
  if (분류 === '판매중') return (stock===0 ? 'out' : 'in');
  return 'in';
}

// ===== 텍스트 시트 파싱 =====
function parseSheet(){
  const raw = document.getElementById('rawSheet').textContent.trim();
  const lines = raw.split('\n');
  const rows = [];
  for (let i=1; i<lines.length; i++) {
    const cols = lines[i].split('\t');
    if (cols.length < 6) continue;
    const barcode = (cols[0]||'').trim();
    const id_str = (cols[1]||'').trim();
    const 분류 = (cols[2]||'').trim();
    const 분류명 = (cols[3]||'').trim();
    const 품번 = (cols[4]||'').trim();
    const name = (cols[5]||'').trim();
    const price = parseInt((cols[6]||'').replace(/[,\s]/g,'')) || 0;
    const release_month = (cols[7]||'').trim();
    const size = (cols[8]||'').trim();
    const weight = (cols[9]||'').trim();
    const package_size = (cols[10]||'').trim();
    const stock = parseInt((cols[11]||'').replace(/[,\s]/g,'')) || 0;
    const dotPrice = parseInt((cols[12]||'').replace(/[,\s]/g,'')) || null;
    if (!barcode || !name) continue;
    rows.push({
      barcode,
      name,
      category: 분류명 || '기타',
      state: mapState(분류, stock),
      price,
      stock,
      release_month: release_month || null,
      _분류: 분류
    });
  }
  return rows;
}

// ===== Diff with DB =====
async function fetchCurrent(){
  const { data, error } = await sb.from('products').select('id,name,category,state,stock,price,barcode,release_month');
  if (error) throw error;
  return data || [];
}

let diffData = null;
async function runDiff(){
  log('파싱…', 'info');
  const sheet = parseSheet();
  log(`시트 행 ${sheet.length}개`, 'ok');

  log('현재 DB 조회…', 'info');
  let current;
  try { current = await fetchCurrent(); }
  catch(e) { log('DB 조회 실패: ' + e.message, 'err'); return; }
  log(`DB 행 ${current.length}개`, 'ok');

  // 바코드 중복 제거 (시트 내 동일 바코드는 마지막 행 사용)
  const dbByBc = {};
  current.forEach(p => { if(p.barcode) dbByBc[p.barcode] = p; });

  const updates = [];     // 기존 행 수정
  const inserts = [];     // DB에 없는 신규 행
  const same = [];

  sheet.forEach(s => {
    const db = dbByBc[s.barcode];
    if (!db) { inserts.push(s); return; }
    const diff = {};
    if (db.name !== s.name) diff.name = [db.name, s.name];
    if (db.category !== s.category) diff.category = [db.category, s.category];
    if (db.state !== s.state) diff.state = [db.state, s.state];
    if ((db.price||0) !== s.price) diff.price = [db.price, s.price];
    if ((db.stock||0) !== s.stock) diff.stock = [db.stock, s.stock];
    if (Object.keys(diff).length === 0) same.push(s);
    else updates.push({ db, sheet:s, diff });
  });

  diffData = { updates, inserts, same };
  document.getElementById('stats').innerHTML =
    `<span class="stat"><b>${updates.length}</b>변경</span>` +
    `<span class="stat"><b>${inserts.length}</b>신규</span>` +
    `<span class="stat"><b>${same.length}</b>동일</span>`;

  // Preview 표
  const tag = (s) => `<span class="tag ${s}">${s}</span>`;
  let html = `<table><thead><tr><th>바코드</th><th>이름</th><th>변경 항목</th></tr></thead><tbody>`;
  updates.forEach(u => {
    const parts = Object.entries(u.diff).map(([k,[a,b]]) =>
      `<div><b>${k}</b>: <span class="same">${a}</span> → <span class="diff">${b}</span></div>`).join('');
    html += `<tr><td class="mono" style="font-size:11px">${u.sheet.barcode}</td><td>${u.sheet.name}</td><td>${parts}</td></tr>`;
  });
  inserts.forEach(i => {
    html += `<tr><td class="mono" style="font-size:11px">${i.barcode}</td><td>${i.name} <span class="new">NEW</span></td><td>분류 ${i.category} · 상태 ${tag(i.state)} · ${i.price.toLocaleString()}원 · 재고 ${i.stock}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('preview').innerHTML = html;

  log(`✓ Diff 완료. 변경 ${updates.length}건 + 신규 ${inserts.length}건 = 적용 가능 ${updates.length+inserts.length}건`, 'ok');
  document.getElementById('applyBtn').disabled = (updates.length + inserts.length === 0);
}

async function runApply(){
  if (!diffData) return;
  const { updates, inserts } = diffData;
  log('업데이트 시작…', 'info');
  let ok=0, fail=0;
  for (const u of updates) {
    const patch = {};
    Object.entries(u.diff).forEach(([k,[_,b]]) => { patch[k] = b; });
    const { error } = await sb.from('products').update(patch).eq('id', u.db.id);
    if (error) { log(`✕ ${u.sheet.name}: ${error.message}`, 'err'); fail++; }
    else ok++;
  }
  log(`${ok}건 업데이트 / ${fail}건 실패`, ok?'ok':'err');

  for (const ins of inserts) {
    const { error } = await sb.from('products').insert({
      name: ins.name, category: ins.category, state: ins.state,
      stock: ins.stock, price: ins.price, barcode: ins.barcode,
      release_month: ins.release_month
    });
    if (error) { log(`✕ INSERT ${ins.name}: ${error.message}`, 'err'); fail++; }
    else { log(`+ INSERT ${ins.name}`, 'ok'); ok++; }
  }
  log(`✅ 전체 ${ok}건 성공 / ${fail}건 실패`, fail?'err':'ok');
  alert(`동기화 완료\n성공 ${ok}건 / 실패 ${fail}건`);
}

// 인증 체크
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) document.getElementById('authWarn').style.display = 'block';
  else log('로그인 OK: ' + session.user.email, 'ok');
})();

document.getElementById('diffBtn').addEventListener('click', runDiff);
document.getElementById('applyBtn').addEventListener('click', runApply);
</script>
