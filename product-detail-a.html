<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서티 SEOTI · 상품 상세 변형 A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root{--bg:#fff;--ink:#161412;--sub:#8c8781;--faint:#bdb8b1;--line:#e7e4df;--paper:#f6f3ee;--accent:#e8503a;--ok:#3aa872}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
.wrap{max-width:1200px;margin:0 auto;padding:0 32px}
.en{font-size:.7em;opacity:.45;margin-left:5px;font-weight:500;letter-spacing:.02em;text-transform:none;font-style:normal}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--sub)}

nav{border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:30}
.nav-in{display:flex;align-items:center;height:64px;gap:30px}
.logo{font-size:20px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.nav-m{display:flex;gap:24px;font-size:13.5px;font-weight:600;color:var(--sub)}
.nav-m a:hover{color:var(--ink)}
.nav-r{margin-left:auto;font-size:13px;font-weight:600;color:var(--sub)}
.nav-r a{margin-left:18px}

.crumb{padding:24px 0;font-size:13px;color:var(--sub)}
.crumb a:hover{color:var(--ink)}
.crumb span{color:var(--ink);font-weight:600}

.pd{display:grid;grid-template-columns:1.15fr 1fr;gap:60px;padding-bottom:60px}
.gallery{position:sticky;top:90px;align-self:flex-start}
.g-main{aspect-ratio:1;background:var(--paper);overflow:hidden;border-radius:2px}
.g-main img{width:100%;height:100%;object-fit:cover}
.g-thumbs{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
.g-thumbs div{aspect-ratio:1;background:var(--paper);overflow:hidden;cursor:pointer;border:2px solid transparent}
.g-thumbs div.on{border-color:var(--ink)}
.g-thumbs img{width:100%;height:100%;object-fit:cover}

.info .ct{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
.info h1{font-size:32px;font-weight:800;letter-spacing:-.025em;margin:14px 0 14px;line-height:1.15}
.rate{display:flex;align-items:center;gap:12px;font-size:13.5px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.rate .stars{color:#f5b942;letter-spacing:.05em}
.rate .num{font-weight:800}.rate .cnt{color:var(--sub)}
.rate .a{margin-left:auto;color:var(--sub);font-weight:600;cursor:pointer}
.rate .a:hover{color:var(--ink)}
.desc{font-size:14px;color:var(--sub);line-height:1.8;margin:20px 0;max-width:420px}
.price-row{display:flex;align-items:baseline;gap:14px;padding:18px 0 22px;border-bottom:1px solid var(--line)}
.price{font-size:30px;font-weight:800}
.price s{font-size:16px;color:var(--sub);font-weight:600;margin-left:8px}
.sale{font-size:12px;background:var(--accent);color:#fff;padding:4px 10px;font-weight:800;letter-spacing:.04em}
.stk-line{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:600;margin:14px 0}
.stk-dot{width:9px;height:9px;border-radius:50%;background:#7fd296}
.stk-dot.out{background:var(--accent)}
.stk-dot.disc{background:var(--faint)}

.spec{display:flex;font-size:13.5px;padding:11px 0;border-bottom:1px solid var(--line)}
.spec .k{width:100px;color:var(--sub);font-weight:600;flex:none}

.opt-row{margin:24px 0}
.opt-row label{display:block;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin-bottom:8px}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opts b{font-size:13px;font-weight:600;padding:9px 14px;border:1px solid var(--line);cursor:pointer}
.opts b.on{border-color:var(--ink);background:var(--ink);color:#fff}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line);margin-top:6px}
.qty button{width:38px;height:42px;border:none;background:none;font-size:16px;cursor:pointer;font-family:inherit}
.qty button:hover{background:var(--paper)}
.qty span{width:50px;text-align:center;font-weight:800;font-size:15px}

.summary{background:var(--paper);padding:18px 20px;margin:24px 0;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.summary .k{color:var(--sub)}.summary .v{font-size:22px;font-weight:800}

.buy{display:flex;gap:10px;margin-top:8px}
.buy button{flex:1;font-family:inherit;font-size:14px;font-weight:800;padding:18px;cursor:pointer;border:1px solid var(--ink);letter-spacing:.04em}
.buy .cart{flex:none;width:130px;background:#fff;color:var(--ink)}
.buy .now{background:var(--ink);color:#fff}
.buy .now:hover{background:var(--accent);border-color:var(--accent)}
.buy .restock{background:#fff;color:var(--ink);flex:1}
.share-row{display:flex;gap:14px;justify-content:center;margin-top:18px;font-size:13px;color:var(--sub);font-weight:600}
.share-row a{cursor:pointer}.share-row a:hover{color:var(--ink)}

/* sticky tabs */
.tabs{position:sticky;top:64px;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--ink);z-index:20;display:flex;gap:30px;padding:14px 0;margin-top:30px}
.tabs a{font-size:13.5px;font-weight:700;color:var(--sub);cursor:pointer}
.tabs a.on{color:var(--ink)}

.sec{padding:50px 0;border-bottom:1px solid var(--line)}
.sec h2{font-size:22px;font-weight:800;letter-spacing:-.015em;margin-bottom:22px;display:flex;align-items:baseline;gap:10px}
.sec h2 small{font-size:13px;color:var(--sub);font-weight:600}

/* detail content */
.detail-text{font-size:15px;line-height:1.95;color:var(--ink);max-width:680px}
.detail-img{margin:22px 0;background:var(--paper);aspect-ratio:1.4/1;overflow:hidden}
.detail-img img{width:100%;height:100%;object-fit:cover}

/* reviews */
.r-sum{display:grid;grid-template-columns:240px 1fr;gap:50px;padding:22px;background:var(--paper);margin-bottom:30px;align-items:center}
.r-sum .big{text-align:center}
.r-sum .big .n{font-size:54px;font-weight:800;letter-spacing:-.04em;line-height:1}
.r-sum .big .stars{color:#f5b942;font-size:18px;margin-top:6px;letter-spacing:.06em}
.r-sum .big small{display:block;font-size:12.5px;color:var(--sub);margin-top:6px}
.r-bars div{display:flex;align-items:center;gap:12px;padding:5px 0;font-size:13px}
.r-bars .lbl{width:30px;font-weight:700}
.r-bars .bar{flex:1;height:7px;background:#fff;border-radius:99px;overflow:hidden}
.r-bars .bar div{height:100%;background:#f5b942;border-radius:99px}
.r-bars .cnt{width:50px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}

.r-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:14px}
.r-controls .seg{display:inline-flex;gap:6px}
.r-controls .seg a{font-size:12.5px;font-weight:700;padding:7px 14px;border:1px solid var(--line);color:var(--sub);cursor:pointer}
.r-controls .seg a.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.r-controls .write{background:var(--ink);color:#fff;border:none;font-family:inherit;font-size:13px;font-weight:800;padding:11px 20px;cursor:pointer;letter-spacing:.04em}

.review{padding:22px 0;border-bottom:1px solid var(--line)}
.r-head{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.r-head .av{width:30px;height:30px;border-radius:50%;background:var(--paper);display:grid;place-items:center;font-weight:800;font-size:12px;color:var(--sub)}
.r-head b{font-size:13.5px;font-weight:800}
.r-head .stars{color:#f5b942;font-size:13px;letter-spacing:.04em}
.r-head .date{margin-left:auto;font-size:12px;color:var(--sub)}
.r-opt{font-size:11.5px;color:var(--sub);margin-bottom:8px}
.r-photos{display:flex;gap:8px;margin:10px 0}
.r-photos div{width:80px;height:80px;background:var(--paper);overflow:hidden}
.r-photos img{width:100%;height:100%;object-fit:cover}
.review p{font-size:13.5px;line-height:1.8;color:var(--ink);margin-top:6px}
.r-reply{margin:14px 0 0 0;padding:14px 16px;background:var(--paper);border-left:3px solid var(--accent);font-size:13px}
.r-reply b{color:var(--accent);font-weight:800}.r-reply p{font-size:13px;color:var(--ink);margin-top:5px}

.r-form{background:var(--paper);padding:24px;margin-top:30px;display:none}
.r-form.on{display:block}
.r-form .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.r-form label{display:block;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin:0 0 6px}
.r-form input,.r-form textarea{width:100%;padding:11px 13px;border:1px solid var(--line);font-family:inherit;font-size:14px;outline:none;background:#fff}
.r-form textarea{min-height:90px;resize:vertical}
.r-form .stars-pick{font-size:24px;color:#e6dcd0;cursor:pointer;letter-spacing:.05em}
.r-form .stars-pick.on{color:#f5b942}
.r-form .upload{margin-top:8px;border:2px dashed var(--line);padding:18px;text-align:center;font-size:13px;color:var(--sub);cursor:pointer}
.r-form .upload:hover{border-color:var(--ink);color:var(--ink)}
.r-form .submit{margin-top:18px;background:var(--ink);color:#fff;border:none;padding:14px 28px;font-family:inherit;font-size:13.5px;font-weight:800;cursor:pointer;letter-spacing:.04em}

/* related */
.rel{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.rel .pc{cursor:pointer}
.rel .pc .ph{aspect-ratio:1;background:var(--paper);overflow:hidden}
.rel .pc .ph img{width:100%;height:100%;object-fit:cover;transition:.4s}
.rel .pc:hover img{transform:scale(1.05)}
.rel .pc .nm{font-size:14px;font-weight:700;margin-top:10px}
.rel .pc .pr{font-size:13.5px;font-weight:700;margin-top:3px}
.rel .pc .ct{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:3px}

footer{padding:30px 0;font-size:12.5px;color:var(--sub);text-align:center;border-top:1px solid var(--ink)}

@media(max-width:880px){.pd{grid-template-columns:1fr;gap:30px}.gallery{position:static}.rel{grid-template-columns:repeat(2,1fr)}.r-sum{grid-template-columns:1fr}}
</style>
</head>
<body data-page="collection">

<div id="seoti-nav"></div>

<main class="wrap">
  <div style="background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:90px 30px;text-align:center;margin:60px 0">
    <div style="font-size:48px;margin-bottom:18px;opacity:.5">🎨</div>
    <h2 style="font-size:22px;font-weight:800;letter-spacing:-.015em;margin-bottom:10px">상품을 준비 중이에요</h2>
    <p style="font-size:14px;color:var(--sub);line-height:1.75">어드민 → 상품 관리에서 첫 상품을 등록하면<br>여기에 상세 페이지가 표시됩니다.</p>
    <a href="mockup-b-minimal.html" style="display:inline-block;margin-top:24px;background:var(--ink);color:#fff;padding:13px 26px;font-size:13.5px;font-weight:800;letter-spacing:.04em;border-radius:99px">← 컬렉션으로 가기</a>
  </div>
</main>

<footer>© 2026 STTY</footer>

<script src="assets/app.js"></script>
<script src="assets/nav.js"></script>
</body>
</html>
