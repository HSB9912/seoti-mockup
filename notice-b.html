<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서티 SEOTI · 공지사항·이벤트 변형 B — 카드 그리드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root{--bg:#fafaf7;--paper:#fff;--ink:#161412;--sub:#8c8781;--faint:#bdb8b1;--line:#e7e4df;--accent:#e8503a;--ok:#3aa872}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
.wrap{max-width:1280px;margin:0 auto;padding:0 30px}
.en{font-size:.7em;opacity:.45;margin-left:5px;font-weight:500;letter-spacing:.02em;text-transform:none;font-style:normal}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--sub)}

nav{background:var(--paper);border-bottom:1px solid var(--line);height:62px;display:flex;align-items:center}
.nav-in{display:flex;align-items:center;gap:30px;width:100%}
.logo{font-size:20px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.nav-m{display:flex;gap:24px;font-size:13.5px;font-weight:600;color:var(--sub)}.nav-m a.on{color:var(--ink)}
.nav-r{margin-left:auto;font-size:13px;color:var(--sub);font-weight:600}.nav-r a{margin-left:18px}

.ph{padding:40px 0 28px;text-align:center}
.ph .eyebrow{margin-bottom:10px}
.ph h1{font-size:38px;font-weight:800;letter-spacing:-.025em;line-height:1.15}
.ph h1 em{font-style:normal;color:var(--accent)}
.ph p{color:var(--sub);font-size:14px;margin-top:8px}

/* filter */
.pills{display:flex;gap:8px;justify-content:center;padding:14px 0 36px;flex-wrap:wrap}
.pills a{padding:9px 18px;font-size:13.5px;font-weight:700;color:var(--sub);background:var(--paper);border:1px solid var(--line);border-radius:99px;cursor:pointer}
.pills a:hover{border-color:var(--ink)}.pills a.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* featured big card */
.feat-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;margin-bottom:24px}
.feat-card .ph{background:var(--paper);overflow:hidden;aspect-ratio:1.2/1}
.feat-card .ph img{width:100%;height:100%;object-fit:cover}
.feat-card .body{padding:40px 44px;display:flex;flex-direction:column;justify-content:center}
.feat-card .ty{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.1em;padding:5px 12px;background:var(--accent);color:#fff;border-radius:99px;text-transform:uppercase;width:fit-content}
.feat-card h2{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:16px 0 12px;line-height:1.2}
.feat-card p{font-size:14px;color:var(--sub);max-width:380px;line-height:1.8}
.feat-card .meta{font-size:12px;color:var(--sub);margin-top:18px;display:flex;gap:18px}
.feat-card .meta b{color:var(--ink);font-weight:800}
.feat-card .cta{display:inline-block;margin-top:24px;background:var(--ink);color:#fff;padding:13px 24px;font-size:13.5px;font-weight:800;letter-spacing:.04em;cursor:pointer;width:fit-content;border-radius:99px}
.feat-card .cta:hover{background:var(--accent)}

/* grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.nc{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
.nc:hover{transform:translateY(-4px);box-shadow:0 18px 36px -16px rgba(80,60,40,.35)}
.nc .ph{aspect-ratio:1.4/1;background:var(--paper);overflow:hidden;position:relative}
.nc .ph img{width:100%;height:100%;object-fit:cover;transition:.4s}
.nc:hover img{transform:scale(1.06)}
.nc .ty{position:absolute;top:12px;left:12px;font-size:10.5px;font-weight:800;letter-spacing:.06em;padding:4px 10px;border-radius:99px;text-transform:uppercase}
.nc .ty.notice{background:var(--ink);color:#fff}
.nc .ty.event{background:var(--accent);color:#fff}
.nc .ty.shop{background:var(--ok);color:#fff}
.nc .ty.twenty{background:#5a7fd9;color:#fff}
.nc .ty.restock{background:var(--ok);color:#fff}
.nc .ty.update{background:#fff;color:var(--sub);border:1px solid var(--line)}
.nc .live{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.95);font-size:10px;font-weight:800;letter-spacing:.04em;padding:4px 9px;border-radius:99px;color:var(--accent)}
.nc .live::before{content:"";display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;margin-right:5px;vertical-align:middle;animation:p 1.2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.nc .body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.nc h3{font-size:15.5px;font-weight:800;letter-spacing:-.01em;line-height:1.35;margin-bottom:8px}
.nc p{font-size:12.5px;color:var(--sub);line-height:1.7;flex:1}
.nc .foot{display:flex;justify-content:space-between;font-size:11.5px;color:var(--sub);margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.nc .foot b{font-weight:800;color:var(--ink)}

.page{display:flex;justify-content:center;gap:4px;padding:40px 0 60px}
.page a{padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--sub);cursor:pointer;border-radius:99px}
.page a.on{background:var(--ink);color:#fff}
.page a:hover:not(.on){background:var(--paper)}

footer{padding:30px 0;font-size:12.5px;color:var(--sub);text-align:center;border-top:1px solid var(--line)}

@media(max-width:900px){.feat-card{grid-template-columns:1fr}.feat-card .body{padding:30px}.feat-card h2{font-size:22px}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.ph h1{font-size:30px}}
</style>
</head>
<body data-page="notice">

<div id="seoti-nav"></div>

<header class="ph">
  <span class="eyebrow">News &amp; Events</span>
  <h1>서티 <em>소식 모음</em></h1>
  <p>공지사항 · 행사 일정 · 입점처 · 트웬티 통판 일정</p>
</header>

<main class="wrap">
  <div class="pills">
    <a class="on">전체</a>
    <a>📢 공지사항</a>
    <a>🎉 행사 일정</a>
    <a>🏪 입점처</a>
    <a>📦 트웬티 통판</a>
  </div>

  <div style="background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:80px 30px;text-align:center;margin-bottom:60px">
    <div style="font-size:42px;margin-bottom:14px;opacity:.5">📢</div>
    <h2 style="font-size:20px;font-weight:800;letter-spacing:-.015em;margin-bottom:8px">아직 등록된 소식이 없어요</h2>
    <p style="font-size:13.5px;color:var(--sub);line-height:1.7">어드민 → 공지·이벤트 관리에서 첫 소식을 등록하면<br>여기에 카드로 표시됩니다.</p>
  </div>
</main>

<footer>© 2026 SEOTI — 디자인 시안용 목업 · 공지·이벤트 변형 B</footer>
<script src="assets/app.js"></script>
<script src="assets/nav.js"></script>
</body>
</html>
